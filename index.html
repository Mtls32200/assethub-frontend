<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetHub — IT Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="xlsx.full.min.js"></script>
<script src="chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2335;
    --border: #2a2f45;
    --border-light: #343b55;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --accent3: #00d4a0;
    --accent4: #f59e0b;
    --danger: #ef4444;
    --text: #e8eaf2;
    --text-muted: #7a82a0;
    --text-dim: #4a5068;
    --sidebar-w: 200px;
    --radius: 10px;
  }
  body.light {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: #e2e6f0;
    --border-light: #d0d5e8;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --accent3: #059669;
    --accent4: #d97706;
    --danger: #dc2626;
    --text: #111827;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  a { text-decoration: none; color: inherit; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    overflow: hidden;
  }
  /* Allow grids/charts to reflow naturally; avoid clipping when sidebar width changes */
  .main { flex: 1; min-height: 100vh; display: flex; flex-direction: column; overflow-x: visible; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .content { padding: 16px 20px; flex: 1; }

  /* SIDEBAR */
  .logo { padding: 20px 20px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .nav-section { padding: 16px 12px 4px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 8px 8px; }

  /* Inventory header (+) */
  .nav-inventory-header { display: flex; align-items: center; justify-content: space-between; padding: 0 8px 8px; }
  .nav-inventory-header .nav-label { padding: 0; }
  .nav-add-cat-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; line-height: 1; font-weight: 700;
    transition: all 0.15s;
  }
  .nav-add-cat-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

  .sidebar.collapsed .nav-inventory-header { justify-content: center; padding: 0 0 10px; }
  .sidebar.collapsed .nav-add-cat-btn { width: 40px; height: 40px; border-radius: 10px; font-size: 20px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13.5px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,142,247,0.12); color: var(--accent); }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; }
  .sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }


  /* TOPBAR */
  .page-title { font-size: 17px; font-weight: 600; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3d7bef; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .btn-icon:hover { color: var(--text); border-color: var(--border-light); }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
    position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border-light); }
  .stat-card[onclick] { transition: all 0.15s; }
  .stat-card[onclick]:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(79,142,247,0.15); }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.blue::before { background: var(--accent); }
  .stat-card.purple::before { background: var(--accent2); }
  .stat-card.green::before { background: var(--accent3); }
  .stat-card.amber::before { background: var(--accent4); }
  .stat-card.red::before { background: var(--danger); }
  .stat-icon { font-size: 24px; margin-bottom: 10px; }
  .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
  .stat-trend { font-size: 11px; color: var(--accent3); margin-top: 6px; }

  /* DASHBOARD (enhanced) */
  .dash-hero{
    background: linear-gradient(135deg, rgba(79,142,247,0.14), rgba(124,92,252,0.10));
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 2px);
    padding: 18px 20px;
    margin-bottom: 18px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 14px;
    overflow:hidden;
  }
  .dash-kicker{ font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color: var(--text-muted);} 
  .dash-title{ font-size:20px; font-weight:700; letter-spacing:-0.4px; margin-top:2px;}
  .dash-sub{ font-size:13px; color: var(--text-muted); margin-top:6px; line-height:1.35;}
  .dash-hero-right{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .pill{
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  body.light .pill{ background: rgba(0,0,0,0.03);}
  .pill b{ color: var(--text); font-weight:700; margin-left:6px;}

  .stat-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .stat-chip{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .stat-meta{
    margin-top: 8px;
    display:flex;
    gap: 8px;
    align-items:center;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-meta span:nth-child(2n){ color: var(--text-dim);}

  .chart-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom: 10px;}
  .chart-sub{ font-size:12px; color: var(--text-muted); margin-top: 3px;}
  .chart-wrap.tall{ height: 220px; }

  .recent-table-sub{ font-size:12px; color: var(--text-muted); margin-top: 2px;}
  .recent-table-header{ align-items:flex-start; gap:12px; }

  /*
    Charts must never overflow horizontally when the sidebar toggles.
    Use auto-fit so the layout collapses to 1 column when space is tight.
  */
  .charts-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
    min-width: 0;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 0;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 180px; }
  .recent-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .recent-table-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .recent-table-title { font-size: 14px; font-weight: 600; }

  /* TABLES */
  .table-container { display: flex; flex-direction: column; }
  .toolbar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    flex-wrap: nowrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto; }
  .search-wrap { position: relative; flex-shrink: 1; min-width: 120px; max-width: 240px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 32px; font-family: inherit; font-size: 13px; color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none;
    cursor: pointer; transition: border-color 0.15s; flex-shrink: 1; min-width: 80px; max-width: 150px;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--surface2); }
  body.light .filter-select, body.light .form-select, body.light .cell-select, body.light .search-input, body.light .form-input, body.light .form-textarea, body.light .token-input { color: var(--text); background: var(--surface2); border-color: var(--border); }
  body.light tbody tr:hover { background: rgba(0,0,0,0.02); }
  body.light .stat-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  body.light .sidebar { box-shadow: 1px 0 8px rgba(0,0,0,0.06); }
  body.light .topbar { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  body.light .toast { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow-x: auto; overflow-y: visible;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) var(--surface2);
  }
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--surface2); border-radius: 0 0 var(--radius) var(--radius); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  table { border-collapse: collapse; table-layout: fixed; }
  thead th {
    padding: 5px 7px; text-align: left; font-size: 10.5px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.3px; background: var(--surface); border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 5;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td { padding: 4px 7px; font-size: 11.5px; white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .table-actions { display: flex; gap: 3px; }
  .icon-btn { padding: 2px 5px; border-radius: 5px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .icon-btn:hover.edit { background: rgba(79,142,247,0.1); border-color: rgba(79,142,247,0.2); color: var(--accent); }
  .icon-btn:hover.del { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: var(--danger); }

  /* STATUS BADGES */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 6px; border-radius: 20px; font-size: 10.5px; font-weight: 500; white-space: nowrap; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
  .badge-interne { background: rgba(79,142,247,0.12); color: #6ba4ff; }
  .badge-interne::before { background: #6ba4ff; }
  .badge-externe { background: rgba(124,92,252,0.12); color: #9d7dff; }
  .badge-externe::before { background: #9d7dff; }
  .badge-stock { background: rgba(0,212,160,0.1); color: var(--accent3); }
  .badge-stock::before { background: var(--accent3); }
  .badge-other { background: rgba(245,158,11,0.1); color: var(--accent4); }
  .badge-other::before { background: var(--accent4); }
  .badge-oui { background: rgba(0,212,160,0.1); color: var(--accent3); }
  .badge-oui::before { background: var(--accent3); }
  .badge-non { background: rgba(245,158,11,0.1); color: var(--accent4); }
  .badge-non::before { background: var(--accent4); }

  /* INLINE EDITING */
  .editable { cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.1s; }
  .editable:hover { background: rgba(79,142,247,0.08); }
  .cell-editor {
    background: var(--bg); border: 1.5px solid var(--accent); border-radius: 6px;
    padding: 3px 8px; font-family: inherit; font-size: 13px; color: var(--text); outline: none;
    min-width: 100px; max-width: 220px; width: 100%;
  }
  .cell-select {
    background: var(--bg); border: 1.5px solid var(--accent); border-radius: 6px;
    padding: 3px 8px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; cursor: pointer;
  }
  .cell-select option { background: var(--surface2); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto;
    transform: translateY(16px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 2px 6px; border-radius: 6px; }
  .close-btn:hover { background: var(--surface2); color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .form-input, .form-select, .form-textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 70px; }

  /* DROPBOX SETUP */
  .setup-card {
    max-width: 560px; margin: 60px auto; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px; text-align: center;
  }
  .setup-icon { font-size: 48px; margin-bottom: 16px; }
  .setup-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .setup-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
  .setup-steps { text-align: left; background: var(--surface2); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .setup-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; font-size: 13px; color: var(--text-muted); }
  .setup-step:last-child { margin-bottom: 0; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .token-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .token-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); outline: none; }
  .token-input:focus { border-color: var(--accent); }

  /* TOAST */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px;
    animation: slideUp 0.25s ease; pointer-events: all; min-width: 240px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .toast.success { border-left: 3px solid var(--accent3); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 15px; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text-dim); }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; gap: 6px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .page-info { font-size: 12px; color: var(--text-muted); margin-right: 8px; }
  .page-btn { padding: 5px 10px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .per-page { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .per-page select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--text); outline: none; cursor: pointer; }
  .per-page select option { background: var(--surface2); }

  /* MISC */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .text-accent { color: var(--accent); }
  .text-green { color: var(--accent3); }
  .text-amber { color: var(--accent4); }
  .text-danger { color: var(--danger); }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
  .user-cell { display: flex; align-items: center; gap: 8px; }

  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .charts-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Sidebar collapse ── */
  .sidebar { transition: width 0.22s ease; overflow: hidden !important; }
  .sidebar.collapsed { width: 64px !important; overflow: hidden !important; }

  /* Hide labels when collapsed */
  .sidebar.collapsed .nav-item-label,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .nav-badge,
  .sidebar.collapsed .logo-text,
  .sidebar.collapsed .logo-sub,
  .sidebar.collapsed .sidebar-toggle-label,
  .sidebar.collapsed .dropbox-label,
  .sidebar.collapsed .dropbox-sync { display: none !important; }

  /* Logo centered */
  .sidebar.collapsed .logo { justify-content: center; padding: 20px 0 12px; }

  /* Nav items */
  .sidebar.collapsed .nav-section { padding: 10px 8px 4px; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 10px 0; margin: 0; }

  /* Footer dot only */
  .sidebar.collapsed .sidebar-footer { padding: 12px 0; display: flex; justify-content: center; }
  .sidebar.collapsed .dropbox-status { justify-content: center; padding: 8px; width: 40px; }
  .sidebar.collapsed .dropbox-dot { margin: 0; }

  /* Toggle button */
  .sidebar-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 6px 14px; margin: 10px 8px 8px;
    border-radius: 8px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .sidebar-toggle:hover { color: var(--text); border-color: var(--accent); }
  .sidebar-toggle-icon {
    width: 20px; height: 20px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .sidebar-toggle:hover .sidebar-toggle-icon { background: var(--accent); border-color: var(--accent); color: white; }
  .sidebar-toggle svg { transition: transform 0.22s ease; display: block; }
  .sidebar.collapsed .sidebar-toggle {
    justify-content: center; padding: 6px 0; margin: 10px 8px 8px;
  }
  .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

  /* Dropbox status */
  .dropbox-status {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px;
    border-radius: 8px; background: var(--surface2); cursor: pointer;
    transition: background 0.15s;
  }
  .dropbox-status:hover { background: var(--surface); }
  .dropbox-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
  .dropbox-dot.connected { background: var(--accent3); }
  .dropbox-label { flex: 1; font-size: 12px; color: var(--text-muted); }
  .dropbox-sync { font-size: 13px; color: var(--text-dim); }

  /*
    Keep the main content fully inside the viewport when the sidebar toggles.
    Using only margin-left shifts a 100%-wide main container and can push
    right-side content (ex: tables) outside the visible window.
  */
  #main {
    margin-left: var(--sidebar-w);
    width: calc(100% - var(--sidebar-w));
    transition: margin-left 0.22s ease, width 0.22s ease;
  }
  #main.sidebar-collapsed {
    margin-left: 64px;
    width: calc(100% - 64px);
  }

  @media (max-width: 900px) {
    #main { margin-left: 0; width: 100%; }
    #main.sidebar-collapsed { margin-left: 0; width: 100%; }
  }

  /* AUTH */
  .auth-shell { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 32px; background: radial-gradient(circle at top right, rgba(79,142,247,0.14), transparent 28%), radial-gradient(circle at bottom left, rgba(124,92,252,0.14), transparent 24%), var(--bg); }
  .auth-card { width: 100%; max-width: 460px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.28); overflow: hidden; }
  .auth-head { padding: 28px 28px 16px; border-bottom: 1px solid var(--border); }
  .auth-kicker { font-size: 11px; letter-spacing: 1.3px; text-transform: uppercase; color: var(--text-muted); }
  .auth-title { font-size: 24px; font-weight: 700; margin-top: 6px; }
  .auth-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
  .auth-body { padding: 24px 28px 28px; }
  .auth-actions { display:flex; gap:10px; margin-top: 18px; }
  .auth-note { margin-top: 14px; font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .profile-menu { position: relative; }
  .profile-trigger { display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:10px; background: var(--surface2); border:1px solid var(--border); cursor:pointer; }
  .profile-trigger:hover { border-color: var(--border-light); }
  .profile-name { font-size:12px; font-weight:600; }
  .profile-role { font-size:11px; color: var(--text-muted); margin-top: 1px; }
  .profile-panel { position:absolute; right:0; top:calc(100% + 10px); width: 320px; background: var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow: 0 24px 64px rgba(0,0,0,0.35); z-index: 300; overflow:hidden; }
  .profile-panel-header { padding:18px 18px 14px; border-bottom: 1px solid var(--border); }
  .profile-panel-body { padding: 18px; display:flex; flex-direction:column; gap: 12px; }
  .profile-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .role-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; background: rgba(79,142,247,0.12); color: var(--accent); padding: 4px 8px; border-radius: 999px; }

</style>

<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
window.ASSETHUB_API_BASE = window.ASSETHUB_API_BASE || "https://assethub-backend.onrender.com";
</script>
<script src="columns.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
const ADMIN_EMAIL = 'lucas.stigliani@mtls-aerostructure.com';

const state = {
  view: 'dashboard',
  selectedUser: null,
  dropboxToken: localStorage.getItem('dbx_token') || '',
  dropboxConnected: false,
  computers: [],
  monitors: [],
  peripherals: [],
  stamps: [],
  users: [],
  customCats: {}, // dynamic: catId -> []
  loading: false,
  searchQ: '',
  filterStatus: '',
  filterBrand: '',
  sortCol: '',
  sortDir: 'asc',
  page: 1,
  perPage: 25,
  editModal: { open: false, type: '', data: null },
  confirmDel: null,
  auth: {
    checking: true,
    token: localStorage.getItem('assethub_auth_token') || '',
    currentUser: null,
    error: '',
    profileOpen: false,
    loginLoading: false,
    saveProfileLoading: false,
  },
};
window.state = state; // expose to external scripts (category.js etc.)

// ============================================================
// DROPBOX API
// ============================================================
const DBX_PATH_COMPUTERS = '/02. OPS/04. MTLS IT-TI/01b. Inventory/Data/computers_inventory.xlsx';
const DBX_PATH_MONITORS = '/02. OPS/04. MTLS IT-TI/01b. Inventory/Data/monitors_inventory.xlsx';
const DBX_PATH_STAMPS = '/02. OPS/04. MTLS IT-TI/01b. Inventory/Data/stamps_inventory.xlsx';
const DBX_PATH_PERIPHERALS = '/02. OPS/04. MTLS IT-TI/01b. Inventory/Data/peripherals_inventory.xlsx';
const DBX_PATH_USERS = '/02. OPS/04. MTLS IT-TI/01b. Inventory/Data/users_inventory.xlsx';

const API_BASE = (window.ASSETHUB_API_BASE || '').replace(/\/$/, '') || 'http://localhost:3001';

async function apiFetch(url, options = {}) {
  const headers = new Headers(options.headers || {});
  if (state.auth?.token && !headers.has('Authorization')) {
    headers.set('Authorization', `Bearer ${state.auth.token}`);
  }
  const res = await fetch(url, {
    credentials: 'include',
    ...options,
    headers
  });
  if (!res.ok) {
    let message = `Request failed: ${res.status}`;
    try {
      const data = await res.json();
      message = data.error || data.message || data.error_summary || message;
    } catch {
      try {
        const txt = await res.text();
        if (txt) message = txt;
      } catch {}
    }
    const err = new Error(message);
    err.status = res.status;
    throw err;
  }
  return res;
}

function userInitials(user) {
  const first = (user?.firstName || '').trim()[0] || '';
  const last = (user?.lastName || '').trim()[0] || '';
  const email = (user?.email || '').trim()[0] || '';
  return (first + last || email || 'U').toUpperCase();
}

function userDisplayName(user) {
  return [user?.firstName || '', user?.lastName || ''].join(' ').trim() || user?.displayName || user?.email || 'User';
}

function isAdminUser(user) {
  return !!user && ((user.role || '').toLowerCase() === 'admin' || (user.email || '').toLowerCase() === ADMIN_EMAIL);
}

async function checkAuthSession() {
  if (!state.auth.token) {
    state.auth.currentUser = null;
    state.auth.checking = false;
    return false;
  }
  try {
    const res = await apiFetch(`${API_BASE}/api/auth/session`);
    const data = await res.json();
    state.auth.currentUser = data.user ? { ...data.user, role: isAdminUser(data.user) ? 'admin' : (data.user.role || 'user') } : null;
    state.auth.error = '';
    return !!state.auth.currentUser;
  } catch (e) {
    localStorage.removeItem('assethub_auth_token');
    state.auth.token = '';
    state.auth.currentUser = null;
    state.auth.error = e.message || 'Session expired';
    return false;
  } finally {
    state.auth.checking = false;
  }
}

window.loginApp = async function() {
  const email = document.getElementById('login-email')?.value?.trim();
  const password = document.getElementById('login-password')?.value || '';
  if (!email || !password) return toast('Enter your email and password', 'error');
  state.auth.loginLoading = true;
  state.auth.error = '';
  render();
  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || data.message || `Login failed (${res.status})`);
    state.auth.token = data.token || '';
    if (state.auth.token) localStorage.setItem('assethub_auth_token', state.auth.token);
    const user = data.user || { email };
    state.auth.currentUser = { ...user, role: isAdminUser(user) ? 'admin' : (user.role || 'user') };
    state.auth.profileOpen = false;
    toast(`Welcome ${userDisplayName(state.auth.currentUser)}`, 'success');
    await bootstrapDataAfterLogin();
  } catch (e) {
    state.auth.error = e.message || 'Unable to sign in';
    toast(state.auth.error, 'error');
  } finally {
    state.auth.loginLoading = false;
    render();
  }
};

window.logoutApp = async function() {
  try {
    if (state.auth.token) {
      await fetch(`${API_BASE}/api/auth/logout`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Authorization': `Bearer ${state.auth.token}` }
      }).catch(() => null);
    }
  } finally {
    localStorage.removeItem('assethub_auth_token');
    state.auth = { ...state.auth, token: '', currentUser: null, checking: false, error: '', profileOpen: false };
    state.dropboxConnected = false;
    state.dropboxToken = '';
    render();
  }
};

window.toggleProfileMenu = function() {
  state.auth.profileOpen = !state.auth.profileOpen;
  render();
};

window.saveProfile = async function() {
  const firstName = document.getElementById('profile-firstName')?.value?.trim() || '';
  const lastName = document.getElementById('profile-lastName')?.value?.trim() || '';
  const password = document.getElementById('profile-password')?.value || '';
  state.auth.saveProfileLoading = true;
  render();
  try {
    const res = await apiFetch(`${API_BASE}/api/auth/me`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName,
        lastName,
        currentPassword: password || undefined,
        newPassword: password || undefined
      })
    });
    const data = await res.json();
    state.auth.currentUser = { ...(state.auth.currentUser || {}), ...(data.user || {}), role: isAdminUser(data.user || state.auth.currentUser) ? 'admin' : ((data.user || state.auth.currentUser || {}).role || 'user') };
    toast('Profile updated', 'success');
    state.auth.profileOpen = false;
  } catch (e) {
    toast(e.message || 'Unable to update profile', 'error');
  } finally {
    state.auth.saveProfileLoading = false;
    render();
  }
};

function renderLogin() {
  return `<div class="auth-shell">
    <div class="auth-card">
      <div class="auth-head">
        <div class="auth-kicker">Secure access</div>
        <div class="auth-title">Sign in to AssetHub</div>
        <div class="auth-sub">Use a backend-managed account. Credentials are checked server-side and are not stored in this public HTML file.</div>
      </div>
      <div class="auth-body">
        <div class="form-field">
          <label>Email</label>
          <input id="login-email" class="form-input" type="email" placeholder="name@mtls-aerostructure.com" value="${state.auth.currentUser?.email || ''}">
        </div>
        <div class="form-field" style="margin-top:12px;">
          <label>Password</label>
          <input id="login-password" class="form-input" type="password" placeholder="Your password">
        </div>
        ${state.auth.error ? `<div class="auth-note text-danger">${state.auth.error}</div>` : `<div class="auth-note">Admin email reserved in UI: <strong>${ADMIN_EMAIL}</strong>. The password must be stored and verified by the backend.</div>`}
        <div class="auth-actions">
          <button class="btn btn-primary" onclick="loginApp()" ${state.auth.loginLoading ? 'disabled' : ''}>${state.auth.loginLoading ? 'Signing in…' : 'Sign in'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderProfileMenu() {
  const u = state.auth.currentUser;
  if (!u) return '';
  return `<div class="profile-menu">
    <button class="profile-trigger" onclick="toggleProfileMenu()">
      <span class="user-avatar">${userInitials(u)}</span>
      <span>
        <div class="profile-name">${userDisplayName(u)}</div>
        <div class="profile-role">${isAdminUser(u) ? 'Administrator' : 'User'}</div>
      </span>
    </button>
    ${state.auth.profileOpen ? `<div class="profile-panel">
      <div class="profile-panel-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="user-avatar" style="width:40px;height:40px;font-size:14px;">${userInitials(u)}</span>
          <div>
            <div style="font-size:15px;font-weight:700;">${userDisplayName(u)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:3px;">${u.email || ''}</div>
          </div>
        </div>
        <div style="margin-top:12px;"><span class="role-badge">${isAdminUser(u) ? 'Admin' : 'User'}</span></div>
      </div>
      <div class="profile-panel-body">
        <div class="profile-grid">
          <div class="form-field">
            <label>First name</label>
            <input id="profile-firstName" class="form-input" value="${u.firstName || ''}">
          </div>
          <div class="form-field">
            <label>Last name</label>
            <input id="profile-lastName" class="form-input" value="${u.lastName || ''}">
          </div>
        </div>
        <div class="form-field">
          <label>Email</label>
          <input class="form-input" value="${u.email || ''}" disabled>
        </div>
        <div class="form-field">
          <label>New password</label>
          <input id="profile-password" class="form-input" type="password" placeholder="Leave blank to keep current password">
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px;">
          <button class="btn btn-secondary btn-sm" onclick="toggleProfileMenu()">Close</button>
          <button class="btn btn-primary btn-sm" onclick="saveProfile()" ${state.auth.saveProfileLoading ? 'disabled' : ''}>${state.auth.saveProfileLoading ? 'Saving…' : 'Save profile'}</button>
          <button class="btn btn-danger btn-sm" onclick="logoutApp()">Log out</button>
        </div>
      </div>
    </div>` : ''}
  </div>`;
}

window.dbxRequest = async function dbxRequest(endpoint, body, binary = false) {
  const res = await apiFetch(`${API_BASE}/api/dropbox/rpc`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint, body, binary })
  });
  if (binary) return res.arrayBuffer();
  return res.json();
}

async function dbxDownloadFile(path) {
  const headers = new Headers();
  if (state.auth?.token) headers.set('Authorization', `Bearer ${state.auth.token}`);
  const res = await fetch(`${API_BASE}/api/dropbox/download?path=${encodeURIComponent(path)}`, {
    credentials: 'include',
    headers
  });
  if (res.status === 404 || res.status === 409) return null;
  if (!res.ok) {
    let message = `Download failed: ${res.status}`;
    try {
      const data = await res.json();
      message = data.error || data.message || message;
    } catch {
      try {
        const txt = await res.text();
        if (txt) message = txt;
      } catch {}
    }
    throw new Error(message);
  }
  return res.arrayBuffer();
}

window.dbxUploadFile = async function dbxUploadFile(path, buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  const fileBase64 = btoa(binary);
  const res = await apiFetch(`${API_BASE}/api/dropbox/upload`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, fileBase64 })
  });
  return res.json();
}

  } catch {

  }
}

function xlsxBufferToRows(buffer) {
  if (!buffer) return [];
  const wb = XLSX.read(buffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
  return rows;
}

window.rowsToXlsxBuffer = function rowsToXlsxBuffer(rows, headers) {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  return XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
}

async function safeDownload(path) {
  try { return await dbxDownloadFile(path); } catch(e) { return null; }
}

async function loadAllData() {
  state.loading = true;
  render();
  try {
    const [compBuf, monBuf, perBuf, stampBuf, userBuf] = await Promise.all([
      safeDownload(DBX_PATH_COMPUTERS),
      safeDownload(DBX_PATH_MONITORS),
      safeDownload(DBX_PATH_PERIPHERALS),
    safeDownload(DBX_PATH_STAMPS),
      safeDownload(DBX_PATH_USERS),
    ]);
    state.computers = compBuf ? normalizeComputers(xlsxBufferToRows(compBuf)) : [];
    state.monitors = monBuf ? normalizeMonitors(xlsxBufferToRows(monBuf)) : [];
    state.peripherals = perBuf ? normalizePeripherals(xlsxBufferToRows(perBuf)) : [];
    state.stamps = stampBuf ? normalizeStamps(xlsxBufferToRows(stampBuf)) : [];
    state.users = userBuf ? normalizeUsers(xlsxBufferToRows(userBuf)) : [];

    // Load custom categories
    const customCats = (window.getCustomCategories ? window.getCustomCategories() : []);
    for (const cat of customCats) {
      try {
        const buf = await safeDownload(cat.dbxPath);
        state[cat.id] = buf ? normalizeGenericCategory(cat.id, xlsxBufferToRows(buf)) : [];
      } catch(e) {
        state[cat.id] = [];
      }
    }

    state.dropboxConnected = true;
    toast(`Chargé : ${state.computers.length} ordinateurs, ${state.monitors.length} moniteurs, ${state.peripherals.length} périphériques, ${state.stamps.length} stamps, ${state.users.length} utilisateurs`, 'success');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
    state.dropboxConnected = false;
  }
  state.loading = false;
  render();
}

    } else if (type === 'peripheral') {
      const idx = state.peripherals.findIndex(p => p.id === id || p.name === id);
      if (idx >= 0) { state.peripherals[idx][field] = value; await savePeripherals(); }
    } else if (type === 'stamp') {
      const idx = state.stamps.findIndex(s => s.id === id || s.name === id);
      if (idx >= 0) { state.stamps[idx][field] = value; await saveStamps(); }

    } else if (type === 'user') {
      const idx = state.users.findIndex(u => u.id === id);
      if (idx >= 0) { state.users[idx][field] = value; await saveUsers(); }
    } else {
      // Custom category
      if (state[type]) {

        if (idx >= 0) { state[type][idx][field] = value; await saveGenericCategory(type); }

function statusLabel(s) {
  const v = normalizeStatusValue(s);
  const map = {
    'Internal': 'Internal',
    'External': 'External',
    'In stock': 'In stock',
    'Other': 'Other',
    'Oui': 'Yes',
    'Non': 'No',
  };
  return map[v] || (v || '—');
}

function statusBadge(s) {
  const v = normalizeStatusValue(s);
  const clsMap = {
    'Internal': 'badge-interne',
    'External': 'badge-externe',
    'In stock': 'badge-stock',
    'Other': 'badge-other',
  };
  const cls = clsMap[v] || 'badge-other';
  return `<span class="badge ${cls}">${statusLabel(v)}</span>`;
}

function onboardBadge(v) {
  const yes = (v === 'Oui' || v === 'Yes');
  return yes ? `<span class="badge badge-oui">Yes</span>` : `<span class="badge badge-non">No</span>`;
}
function avatarHTML(name) {
  if (!name || name === '—') return '';
  const parts = name.trim().split(/\s+/);
  const initials = parts.length >= 2 ? parts[0][0] + parts[parts.length-1][0] : parts[0].slice(0,2);
  return `<span class="user-avatar">${initials.toUpperCase()}</span>`;
}
function userCell(name) {
  if (!name) return '<span class="text" style="color:var(--text-dim)">—</span>';
  return `<span class="user-cell">${avatarHTML(name)}<span>${name}</span></span>`;
}
function editableCell(rowId, field, value, type, options = null) {
  const display = value || '—';
  if (options) {
    return `<span class="editable" onclick="startSelectEdit(this,'${type}','${rowId}','${field}')" data-val="${value}">${display}</span>`;
  }
  return `<span class="editable" onclick="startTextEdit(this,'${type}','${rowId}','${field}')" data-val="${value}">${display}</span>`;
}

window.startTextEdit = function(el, type, id, field) {
  const cur = el.dataset.val || '';
  const input = document.createElement('input');
  input.className = 'cell-editor';
  input.value = cur;
  el.replaceWith(input);
  input.focus();
  input.select();
  const commit = () => { saveCellEdit(type, id, field, input.value); };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { input.blur(); } if (e.key === 'Escape') render(); });
};

window.startSelectEdit = function(el, type, id, field) {
  const statusOpts = [
    { value: 'Internal', label: 'Internal' },
    { value: 'External', label: 'External' },
    { value: 'In stock', label: 'In stock' },
    { value: 'Other', label: 'Other' },
  ];
  const onboardOpts = [
    { value: 'Oui', label: 'Yes' },
    { value: 'Non', label: 'No' },
  ];
  const opts = field === 'status' ? statusOpts : onboardOpts;
  const cur = el.dataset.val || '';
  const sel = document.createElement('select');
  sel.className = 'cell-select';
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.value;
    opt.textContent = o.label;
    if (o.value === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  el.replaceWith(sel);
  sel.focus();
  sel.addEventListener('change', () => { saveCellEdit(type, id, field, sel.value); });
  sel.addEventListener('blur', () => render());
};

window.startUserEdit = function(el, type, id, field) {
  const td = el.closest ? el.closest('td') : el;
  const cur = td.querySelector('[data-val]')?.dataset?.val || '';
  const sel = document.createElement('select');
  sel.className = 'cell-select';
  const blank = document.createElement('option'); blank.value = ''; blank.textContent = '— Unassigned —'; sel.appendChild(blank);
  state.users.forEach(u => {
    const name = `${u.firstName} ${u.lastName}`.trim();
    const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
    if (name === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  td.innerHTML = '';
  td.appendChild(sel);
  sel.focus();
  let saved = false;
  sel.addEventListener('change', () => {
    saved = true;
    saveCellEdit(type, id, field, sel.value);
  });
  sel.addEventListener('blur', () => { if (!saved) render(); });
};

window.saveModal = async function() {
  const form = document.getElementById('modal-form');
  const data = {};
  form.querySelectorAll('[name]').forEach(el => { data[el.name] = el.value; });
  const { type, data: existing } = state.editModal;

      if (existing) {
        const idx = existing._rowId !== undefined ? parseInt(existing._rowId) : state.computers.findIndex(c => c.computerName === existing.computerName || c.id === existing.id);
        if (idx >= 0) state.computers[idx] = { ...state.computers[idx], ...data };
      } else {
        state.computers.unshift({ id: `C${Date.now()}`, ...data, _rowId: '0', _type: 'computer' }); state.page = 1;
      }
      await saveComputers();
    } else if (type === 'monitor') {
      if (existing) {
        const idx = state.monitors.findIndex(m => m.id === existing.id);
        if (idx >= 0) state.monitors[idx] = { ...state.monitors[idx], ...data };
      } else {
        state.monitors.unshift({ id: `M${Date.now()}`, ...data, _type: 'monitor' }); state.page = 1;
      }
      await saveMonitors();
    } else if (type === 'peripheral') {
      if (existing) {
        const idx = state.peripherals.findIndex(p => p.id === existing.id);
        if (idx >= 0) state.peripherals[idx] = { ...state.peripherals[idx], ...data };
      } else {
        state.peripherals.unshift({ id: `P${Date.now()}`, ...data, _type: 'peripheral' }); state.page = 1;
      }
      await savePeripherals();
    } else if (type === 'stamp') {
      if (existing) {
        const idx = state.stamps.findIndex(s => s.id === existing.id);
        if (idx >= 0) state.stamps[idx] = { ...state.stamps[idx], ...data };
      } else {
        state.stamps.unshift({ id: `Q${Date.now()}`, ...data, _type: 'stamp' }); state.page = 1;
      }
      await saveStamps();
    } else if (type === 'user') {
      if (existing) {
        const idx = state.users.findIndex(u => u.id === existing.id);
        if (idx >= 0) state.users[idx] = { ...state.users[idx], ...data };
      } else {
        state.users.push({ id: `U${Date.now()}`, ...data });
      }
      await saveUsers();
    } else {
      // Custom category
      if (!state[type]) state[type] = [];
      if (existing) {
        const idx = state[type].findIndex(r => r.id === existing.id);
        if (idx >= 0) state[type][idx] = { ...state[type][idx], ...data };
      } else {
        state[type].unshift({ id: `${type.slice(0,3).toUpperCase()}${Date.now()}`, ...data, _type: type }); state.page = 1;
      }
      await saveGenericCategory(type);
    }
    closeModal();
    toast('Saved successfully', 'success');
    render();

    toast('Error: ' + e.message, 'error');

  document.getElementById('del-modal')?.classList.remove('open');
  setTimeout(() => { state.confirmDel = null; render(); }, 200);
};
window.doDelete = async function() {
  const { type, id } = state.confirmDel;
  try {
    if (type === 'computer') { const ri = parseInt(id); state.computers = !isNaN(ri) ? state.computers.filter((_, i) => i !== ri) : state.computers.filter(c => c.computerName !== id && c.id !== id); await saveComputers(); }
    else if (type === 'monitor') { state.monitors = state.monitors.filter(m => m.id !== id); await saveMonitors(); }
    else if (type === 'peripheral') { state.peripherals = state.peripherals.filter(p => p.id !== id); await savePeripherals(); }
    else if (type === 'stamp') { state.stamps = state.stamps.filter(s => s.id !== id); await saveStamps(); }
    else if (type === 'user') { state.users = state.users.filter(u => u.id !== id); await saveUsers(); }
    else if (state[type]) { state[type] = state[type].filter(r => r.id !== id); await saveGenericCategory(type); }
    closeDelModal();
    toast('Deleted', 'success');
    render();
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
};

window.setView = function(v) { state.view = v; state.page = 1; state.searchQ = ''; state.filterStatus = ''; state.filterBrand = ''; if (v === 'users') { state.sortCol = 'lastName'; state.sortDir = 'asc'; } render(); };

window.backFromProfile = function() { state.selectedUser = null; state.view = 'users'; render(); };
window.setSearch = function(v) {
  state.searchQ = v;
  state.page = 1;
  const active = document.activeElement;
  const selStart = active?.selectionStart;
  const selEnd = active?.selectionEnd;
  const wasSearch = active?.classList.contains('search-input');
  render();
  if (wasSearch) {
    const newInput = document.querySelector('.search-input');
    if (newInput) {
      newInput.focus();
      try { newInput.setSelectionRange(selStart, selEnd); } catch(e) {}
    }
  }
};
window.setFilterStatus = function(v) { state.filterStatus = v; state.page = 1; render(); };
window.setFilterBrand = function(v) { state.filterBrand = v; state.page = 1; render(); };
window.setSort = function(col) {
  if (state.sortCol === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  else { state.sortCol = col; state.sortDir = 'asc'; }
  render();
};
window.setPage = function(p) { state.page = p; render(); };
window.setPerPage = function(n) { state.perPage = parseInt(n); state.page = 1; render(); };

function filterAndSort(rows, fields) {
  let arr = [...rows];
  if (state.searchQ) {
    const q = state.searchQ.toLowerCase();
    arr = arr.filter(r => fields.some(f => (r[f] || '').toString().toLowerCase().includes(q)));
  }
  if (state.filterStatus) arr = arr.filter(r => (r.status || '') === state.filterStatus);
  if (state.filterBrand) arr = arr.filter(r => (r.brand || '') === state.filterBrand);
  if (state.sortCol) {
    arr.sort((a, b) => {
      const av = (a[state.sortCol] || '').toString().toLowerCase();
      const bv = (b[state.sortCol] || '').toString().toLowerCase();
      return state.sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }
  return arr;
}

function paginate(arr) {
  const total = arr.length;
  const pages = Math.ceil(total / state.perPage) || 1;
  const start = (state.page - 1) * state.perPage;
  return { items: arr.slice(start, start + state.perPage), total, pages };
}

function sortIcon(col) {
  if (state.sortCol !== col) return '<span class="sort-icon">↕</span>';
  return `<span class="sort-icon">${state.sortDir === 'asc' ? '↑' : '↓'}</span>`;
}
function th(label, col) {
  return `<th onclick="setSort('${col}')" class="${state.sortCol === col ? 'sorted' : ''}">${label} ${sortIcon(col)}</th>`;
}

function paginationHTML(total, pages) {
  const start = (state.page - 1) * state.perPage + 1;
  const end = Math.min(state.page * state.perPage, total);
  let btns = '';
  const maxBtns = 5;
  let s = Math.max(1, state.page - 2), e = Math.min(pages, s + maxBtns - 1);
  if (e - s < maxBtns - 1) s = Math.max(1, e - maxBtns + 1);
  for (let i = s; i <= e; i++) btns += `<button class="page-btn ${i === state.page ? 'active' : ''}" onclick="setPage(${i})">${i}</button>`;
  return `<div class="pagination">
    <span class="page-info">${start}–${end} of ${total}</span>
    <button class="page-btn" onclick="setPage(${state.page-1})" ${state.page <= 1 ? 'disabled' : ''}>‹</button>
    ${btns}
    <button class="page-btn" onclick="setPage(${state.page+1})" ${state.page >= pages ? 'disabled' : ''}>›</button>
    <div class="per-page">Rows: <select onchange="setPerPage(this.value)">
      ${[25,50,100].map(n => `<option value="${n}" ${n === state.perPage ? 'selected' : ''}>${n}</option>`).join('')}
    </select></div>
  </div>`;
}

function renderUserProfile() {
  const user = state.users.find(u => u.id === state.selectedUser);

  const fullName = `${user.firstName} ${user.lastName}`.trim();
  const computers = state.computers.filter(c => c.user === fullName);
  const monitors = state.monitors.filter(m => m.user === fullName);
  const peripherals = state.peripherals.filter(p => p.user === fullName);
  const totalDevices = computers.length + monitors.length + peripherals.length;

  const deviceTable = (title, icon, items, cols) => {
    if (!items.length) return `<div style="color:var(--text-dim);font-size:13px;padding:12px 0">Aucun ${title.toLowerCase()} assigné</div>`;
    return `<div class="chart-card" style="margin-bottom:16px">
      <div class="chart-title">${icon} ${title} <span style="color:var(--accent);margin-left:6px">${items.length}</span></div>
      <table style="width:100%;margin-top:10px">
        <thead><tr>${cols.map(c=>`<th style="padding:6px 10px;font-size:11px;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left">${c.label}</th>`).join('')}</tr></thead>
        <tbody>${items.map(item=>`<tr style="border-bottom:1px solid var(--border)">${cols.map(c=>`<td style="padding:7px 10px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">${c.render ? c.render(item) : (item[c.key]||'—')}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>`;
  };

  return `
    <div style="margin-bottom:16px">
      <button class="btn btn-secondary btn-sm" onclick="backFromProfile()">← Back</button>
    </div>
    <div style="display:grid;grid-template-columns:260px 1fr;gap:16px">
      <div class="chart-card" style="text-align:center;align-self:start">

        <div style="font-size:17px;font-weight:700;margin-bottom:4px">${fullName}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:2px">${user.jobTitle||'—'}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${user.department||'—'}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">📧 ${user.email||'—'}</div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
          <div><div style="font-size:22px;font-weight:700;color:var(--accent)">${computers.length}</div><div style="font-size:11px;color:var(--text-muted)">PC</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--accent2)">${monitors.length}</div><div style="font-size:11px;color:var(--text-muted)">Monitors</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--accent3)">${peripherals.length}</div><div style="font-size:11px;color:var(--text-muted)">Peripherals</div></div>
        </div>

function renderReports() {
  const byStatus = {};
  state.computers.forEach(c => { byStatus[c.status||'Unknown'] = (byStatus[c.status||'Unknown'] || 0) + 1; });
  const byBrand = {};
  state.computers.forEach(c => { if (c.brand) byBrand[c.brand] = (byBrand[c.brand] || 0) + 1; });
  const userDevices = {};
  state.computers.filter(c => c.user && c.user !== 'Bureau RCA').forEach(c => {
    userDevices[c.user] = (userDevices[c.user] || 0) + 1;
  });
  const topUsers = Object.entries(userDevices).sort((a,b) => b[1]-a[1]).slice(0, 10);

  return `
    <div class="charts-row">
      <div class="chart-card"><div class="chart-title">Computer Status Breakdown</div>
        <table style="width:100%;font-size:13px;margin-top:8px">

          <tbody>${Object.entries(byStatus).map(([s,n]) => `
            <tr><td style="padding:6px 0">${statusBadge(s)}</td>
            <td style="padding:6px 0;text-align:right;font-family:var(--mono)">${n}</td>
            <td style="padding:6px 0;text-align:right;color:var(--text-muted)">${(n/state.computers.length*100).toFixed(1)}%</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="chart-card"><div class="chart-title">Computers by Brand</div>
        <table style="width:100%;font-size:13px;margin-top:8px">
          <thead><tr><th style="padding:6px 0;color:var(--text-muted)">Brand</th><th style="padding:6px 0;color:var(--text-muted);text-align:right">Count</th><th style="padding:6px 0;color:var(--text-muted);text-align:right">%</th></tr></thead>
          <tbody>${Object.entries(byBrand).map(([b,n]) => `
            <tr><td style="padding:6px 0">${b}</td>

            <td style="padding:6px 0;text-align:right;color:var(--text-muted)">${(n/state.computers.length*100).toFixed(1)}%</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="chart-card"><div class="chart-title">Top Users by Device Count</div>
      <table style="width:100%;font-size:13px;margin-top:8px">
        <thead><tr><th style="padding:6px 0;color:var(--text-muted)">User</th><th style="padding:6px 0;color:var(--text-muted);text-align:right">Devices</th></tr></thead>
        <tbody>${topUsers.map(([u,n]) => `
          <tr><td style="padding:6px 0">${userCell(u)}</td>
          <td style="padding:6px 0;text-align:right"><span class="badge badge-interne">${n}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderDelModal() {
  if (!state.confirmDel) return '';
  const { label } = state.confirmDel;
  return `<div class="modal-overlay" id="del-modal" onclick="if(event.target===this)closeDelModal()">
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><div class="modal-title">Confirm Delete</div><button class="close-btn" onclick="closeDelModal()">×</button></div>
      <div class="modal-body"><p style="color:var(--text-muted);font-size:14px">Are you sure you want to delete <strong style="color:var(--text)">${label}</strong>? This will also update the Excel file on Dropbox.</p></div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeDelModal()">Cancel</button><button class="btn btn-danger" onclick="doDelete()">Delete</button></div>
    </div>
  </div>`;
}

window.toggleTheme = function() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  render();
};
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

  { id: 'dashboard', icon: '⊞', label: 'Dashboard', section: 'main' },
  { id: 'computers', icon: '🖥', label: 'Computers', section: 'inventory' },
  { id: 'monitors', icon: '🖥️', label: 'Monitors', section: 'inventory' },
  { id: 'peripherals', icon: '🖱', label: 'Peripherals', section: 'inventory' },
  { id: 'stamps', icon: '📋', label: 'Stamps', section: 'inventory' },
  { id: 'users', icon: '👥', label: 'Users', section: 'people' },
  { id: 'reports', icon: '📊', label: 'Reports', section: 'people' },
];

const pageTitles = {
  dashboard: 'Dashboard',
  computers: 'Computers',
  monitors: 'Monitors',
  peripherals: 'Peripherals',
  stamps: 'Stamps',
  users: 'Users',
  reports: 'Reports',
  userProfile: 'User profile',
};

function getPageTitle(view) {
  if (pageTitles[view]) return pageTitles[view];
  // Custom category
  const cats = window.getCustomCategories ? window.getCustomCategories() : [];
  const cat = cats.find(c => c.id === view);
  return cat ? `${cat.icon} ${cat.name}` : 'AssetHub';
}

function isCustomCatView(view) {
  const cats = window.getCustomCategories ? window.getCustomCategories() : [];
  return cats.some(c => c.id === view);
}

function renderCustomCategory(catId) {
  const cat = window.getCustomCategory ? window.getCustomCategory(catId) : null;
  if (!cat) return '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Category not found</div></div>';
  if (!state[catId]) state[catId] = [];

  const cols = getColumns(catId).filter(c => c.visible);
  const filtered = filterAndSort(state[catId], ['name','user','brand','model','serialNumber','status','localisation']);
  const { items, total, pages } = paginate(filtered);

  function thFor(col) {
    const w = colWidth(col.key);
    if (col.sortable) return `<th${w} data-key="${col.key}" onclick="setSort('${col.key}')" class="${state.sortCol===col.key?'sorted':''}">${col.label} ${sortIcon(col.key)}</th>`;
    return `<th${w} data-key="${col.key}">${col.label}</th>`;
  }

  function tdFor(col, r) {
    switch(col.key) {
      case 'name': return `<td class="mono">${editableCell(r.id,'name',r.name,catId)}</td>`;
      case 'user': return `<td title="${r.user}" onclick="startUserEdit(this.querySelector('.editable'),\`${catId}\`,'${r.id}','user')" style="cursor:pointer"><span class="editable" data-val="${r.user}">${userCell(r.user)}</span></td>`;
      case 'brand': return `<td>${editableCell(r.id,'brand',r.brand,catId)}</td>`;
      case 'model': return `<td>${editableCell(r.id,'model',r.model,catId)}</td>`;
      case 'serialNumber': return `<td class="mono">${editableCell(r.id,'serialNumber',r.serialNumber,catId)}</td>`;
      case 'localisation': return `<td>${editableCell(r.id,'localisation',r.localisation,catId)}</td>`;
      case 'status': return `<td>${r.status ? `<span class="editable" onclick="startSelectEdit(this,'${catId}','${r.id}','status')" data-val="${r.status}">${statusBadge(r.status)}</span>` : '—'}</td>`;
      case 'notes': return `<td title="${r.notes}">${editableCell(r.id,'notes',r.notes,catId)}</td>`;
      default: return `<td>${editableCell(r.id,col.key,r[col.key]||'',catId)}</td>`;
    }
  }

  return `
    <div class="table-container">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Rechercher…" value="${state.searchQ}" oninput="setSearch(this.value)"></div>
      </div>      <div class="toolbar-right">
        <button class="btn-columns" onclick="openColumnManager('${catId}')">⚙ Columns</button>
        <button class="btn btn-secondary btn-sm" onclick="syncDropbox()">⟳ Sync</button>
        <button class="btn btn-primary" onclick="openAddModal('${catId}')">+ Add</button>
      </div>
    </div>
    <div class="table-wrap" data-cat="${catId}">
      <table>
        <thead><tr>${cols.map(thFor).join('')}<th>Actions</th></tr></thead>
        <tbody>${items.length ? items.map(r => `
          <tr>${cols.map(col => tdFor(col,r)).join('')}
            <td><div class="table-actions">
              <button class="icon-btn edit" onclick="openEditModal('${catId}','${r.id}')" title="Edit">✎</button>
              <button class="icon-btn del" onclick="confirmDelete('${catId}','${r.id}','${r.name}')" title="Delete">✕</button>
            </div></td>
          </tr>`).join('') : `<tr><td colspan="${cols.length+1}"><div class="empty-state"><div class="empty-icon">${cat.icon}</div><div class="empty-text">Aucun élément dans ${cat.name}</div></div></td></tr>`}
        </tbody>
      </table>
    </div>
    ${paginationHTML(total, pages)}
    </div>`;
}

async function bootstrapDataAfterLogin() {
  state.loading = true;
  render();
  try {
    const ok = await testDropboxConnection();
    state.dropboxConnected = ok;
    state.dropboxToken = ok ? 'backend-managed' : '';
    if (state.dropboxConnected) {
      await loadAllData();
    }
  } catch (e) {
    console.error('Initial data load failed:', e);
    state.dropboxConnected = false;
    state.dropboxToken = '';
    toast('Initial sync failed: ' + (e.message || e), 'error');
  } finally {
    state.loading = false;
  }
}

        </div>
        <div class="nav-section"><div class="nav-label">People & Reports</div>
          ${navItems.filter(n=>n.section==='people').map(n=>`<div class="nav-item ${state.view===n.id?'active':''}" onclick="setView('${n.id}')" data-label="${n.label}"><span class="nav-icon">${n.icon}</span><span class="nav-item-label">${n.label}</span></div>`).join('')}
        </div>
        <div class="sidebar-footer">
          <div class="dropbox-status" onclick="syncDropbox()" title="${state.dropboxConnected ? 'Dropbox synchronisé — cliquer pour resync' : 'Cliquer pour reconnecter'}">
            <div class="dropbox-dot${state.dropboxConnected?' connected':''}"></div>
            <span class="dropbox-label">${state.dropboxConnected ? 'Dropbox Synced' : 'Reconnect'}</span>
            <span class="dropbox-sync">⟳</span>
          </div>
        </div>
      </nav>
      <main class="main" id="main">
        <div class="topbar">
          ${pageTitleHTML}
          <div class="topbar-actions">
            <span style="font-size:12px;color:var(--text-muted)">${totalDevices} total assets</span>
            <button class="btn-icon" onclick="toggleTheme()" title="Changer le thème" id="theme-btn">${document.body.classList.contains('light') ? '🌙' : '☀️'}</button>
            <button class="btn-icon" onclick="syncDropbox()" title="Sync with Dropbox">⟳</button>
            ${renderProfileMenu()}
          </div>
        </div>
        <div class="content">${viewHTML}</div>
      </main>
    </div>
    ${renderModal()}${renderDelModal()}`;
  if (typeof initSidebar === 'function') initSidebar();
  if (typeof initResizableCols === "function") initResizableCols();
}

// ============================================================
// INIT
// ============================================================
async function bootstrapApp() {
  await checkAuthSession();
  render();
  if (state.auth.currentUser) {
    await bootstrapDataAfterLogin();
  }
  render();
}
</script>
<script src="sidebar.js"></script>
<script src="category.js"></script>
<script>
document.addEventListener('click', (e) => {
  if (!e.target.closest('.profile-menu') && state.auth.profileOpen) {
    state.auth.profileOpen = false;
    render();
  }
});
bootstrapApp();
</script>
</body>
</html>
