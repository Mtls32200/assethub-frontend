<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssetHub - MTLS Inventory</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #222; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 18px; background:#111827; color:#fff; }
    .container { padding: 20px; }
    .card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.08); margin-bottom:16px; }
    .hidden { display:none; }
    input, button, select { padding:10px; border-radius:8px; border:1px solid #ccc; }
    button { cursor:pointer; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .muted { color:#666; font-size:14px; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>

  <script>
    window.ASSETHUB_API_BASE = 'https://assethub-backend.onrender.com';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    const API_BASE = (window.ASSETHUB_API_BASE || '').replace(/\/$/, '') || 'http://localhost:3001';

    const state = {
      authUser: null,
      computers: [],
      monitors: [],
      peripherals: [],
      stamps: [],
      users: []
    };

    function $(id) { return document.getElementById(id); }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        credentials: 'include',
        ...options,
        headers: {
          ...(options.headers || {})
        }
      });

      if (!res.ok) {
        let message = `Request failed: ${res.status}`;
        try {
          const data = await res.json();
          message = data.error || data.message || data.error_summary || message;
        } catch {
          try {
            const txt = await res.text();
            if (txt) message = txt;
          } catch {}
        }
        const err = new Error(message);
        err.status = res.status;
        throw err;
      }
      return res;
    }

    async function checkSession() {
      try {
        const res = await apiFetch(`${API_BASE}/api/auth/session`);
        state.authUser = await res.json();
        return state.authUser;
      } catch {
        state.authUser = null;
        return null;
      }
    }

    async function login(email, password) {
      await apiFetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      return checkSession();
    }

    async function logout() {
      await apiFetch(`${API_BASE}/api/auth/logout`, { method: 'POST' });
      state.authUser = null;
    }

    async function dbxRequest(endpoint, body = {}) {
      const res = await apiFetch(`${API_BASE}/api/dropbox/rpc`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint, body })
      });
      return res.json();
    }

    async function dbxDownloadFile(path) {
      const res = await fetch(`${API_BASE}/api/dropbox/download?path=${encodeURIComponent(path)}`, {
        credentials: 'include'
      });

      if (res.status === 404 || res.status === 409) return null;
      if (!res.ok) {
        let message = `Download failed: ${res.status}`;
        try {
          const data = await res.json();
          message = data.error || data.message || message;
        } catch {}
        throw new Error(message);
      }
      return res.arrayBuffer();
    }

    async function dbxUploadFile(path, fileBase64) {
      const res = await apiFetch(`${API_BASE}/api/dropbox/upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path, fileBase64 })
      });
      return res.json();
    }

    async function safeDownload(path) {
      try {
        return await dbxDownloadFile(path);
      } catch (e) {
        console.error('safeDownload error', path, e);
        return null;
      }
    }

    function renderLogin() {
      $('authView').classList.remove('hidden');
      $('appView').classList.add('hidden');
    }

    function renderApp() {
      $('authView').classList.add('hidden');
      $('appView').classList.remove('hidden');
      $('whoami').textContent = state.authUser
        ? `${state.authUser.email || ''} (${state.authUser.role || ''})`
        : '';

      $('computersCount').textContent = state.computers.length;
      $('monitorsCount').textContent = state.monitors.length;
      $('peripheralsCount').textContent = state.peripherals.length;
      $('usersCount').textContent = state.users.length;

      $('debug').textContent = JSON.stringify({
        user: state.authUser,
        computers: state.computers.length,
        monitors: state.monitors.length,
        peripherals: state.peripherals.length,
        users: state.users.length
      }, null, 2);
    }

    async function loadExcelRows(path) {
      const buffer = await safeDownload(path);
      if (!buffer) return [];

      const workbook = XLSX.read(buffer, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      if (!firstSheetName) return [];

      const sheet = workbook.Sheets[firstSheetName];
      return XLSX.utils.sheet_to_json(sheet, { defval: '' });
    }

    async function loadAllData() {
      const paths = {
        computers: '/02. OPS/04. MTLS IT-TI/01b. Inventory/Computers.xlsx',
        monitors: '/02. OPS/04. MTLS IT-TI/01b. Inventory/Monitors.xlsx',
        peripherals: '/02. OPS/04. MTLS IT-TI/01b. Inventory/Peripherals.xlsx',
        users: '/02. OPS/04. MTLS IT-TI/01b. Inventory/Users.xlsx'
      };

      state.computers = await loadExcelRows(paths.computers);
      state.monitors = await loadExcelRows(paths.monitors);
      state.peripherals = await loadExcelRows(paths.peripherals);
      state.users = await loadExcelRows(paths.users);

      $('pathsStatus').textContent = JSON.stringify({
        [paths.computers]: `${state.computers.length} rows`,
        [paths.monitors]: `${state.monitors.length} rows`,
        [paths.peripherals]: `${state.peripherals.length} rows`,
        [paths.users]: `${state.users.length} rows`
      }, null, 2);
    }

    window.addEventListener('DOMContentLoaded', async () => {
      $('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        $('loginError').textContent = '';
        try {
          await login($('loginEmail').value.trim(), $('loginPassword').value);
          await loadAllData();
          renderApp();
        } catch (err) {
          $('loginError').textContent = err.message || 'Connexion impossible';
        }
      });

      $('logoutBtn').addEventListener('click', async () => {
        await logout();
        renderLogin();
      });

      const user = await checkSession();
      if (user) {
        await loadAllData();
        renderApp();
      } else {
        renderLogin();
      }
    });
  </script>
</head>
<body>
  <div class="topbar">
    <div><strong>AssetHub MTLS</strong></div>
    <div class="muted" id="whoami"></div>
  </div>

  <div class="container">
    <div id="authView" class="card hidden">
      <h2>Connexion</h2>
      <form id="loginForm">
        <div class="row">
          <input id="loginEmail" type="email" name="email" autocomplete="username" placeholder="Email" required />
          <input id="loginPassword" type="password" name="password" autocomplete="current-password" placeholder="Mot de passe" required />
          <button type="submit">Se connecter</button>
        </div>
      </form>
      <p id="loginError" style="color:#b00020;"></p>
    </div>

    <div id="appView" class="hidden">
      <div class="card">
        <div class="row">
          <button id="logoutBtn">Déconnexion</button>
        </div>
      </div>

      <div class="row">
        <div class="card">Computers: <strong id="computersCount">0</strong></div>
        <div class="card">Monitors: <strong id="monitorsCount">0</strong></div>
        <div class="card">Peripherals: <strong id="peripheralsCount">0</strong></div>
        <div class="card">Users: <strong id="usersCount">0</strong></div>
      </div>

      <div class="card">
        <h3>Debug</h3>
        <p class="muted">Chargement des fichiers Excel Dropbox via le backend Render authentifié.</p>
        <pre id="debug"></pre>
      </div>

      <div class="card">
        <h3>Test des chemins Dropbox</h3>
        <pre id="pathsStatus"></pre>
      </div>
    </div>
  </div>
</body>
</html>
